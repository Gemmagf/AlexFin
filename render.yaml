services:
  - type: web
    name: alexfin-advisor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dash_app:server --workers 1 --timeout 120
    plan: free
    branch: upgrade-streamlit-app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: AUTH_USER
        value: alex
      - key: AUTH_PASS
        sync: false
